[server]
bind = "0.0.0.0:8080"
webhook_secret = "change-me"
max_concurrent_reviews = 4

[gitlab]
base_url = "https://gitlab.example.com"
token = "<your-gitlab-token>"
api_timeout_seconds = 30
archive_timeout_seconds = 300

[storage]
database_url = "sqlite://gitlab-work-runner.db"

[rules]
file = "rules.toml"

[dashboard]
bind = "0.0.0.0:8082"

[logging]
file = "logs/gitlab-work-runner.log"
max_bytes = 10485760
max_files = 5

[archive]
max_archive_bytes = 209715200      # 200 MiB (压缩包上限)
max_extracted_files = 10000        # 10,000 files
max_extracted_bytes = 419430400    # 400 MiB (解压后上限，留2倍余量)
max_single_file_bytes = 41943040   # 40 MiB
max_entry_path_bytes = 512         # 512 bytes
