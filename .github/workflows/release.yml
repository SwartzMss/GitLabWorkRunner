name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $packageName = "gitlab-work-runner-$version-windows-x86_64"
          $packageDir = Join-Path "dist" $packageName
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          Copy-Item "target\release\gitlab-work-runner.exe" $packageDir
          Copy-Item "config.example.toml" $packageDir
          Copy-Item "rules.example.toml" $packageDir
          Copy-Item "README.md" $packageDir
          Copy-Item "README.en.md" $packageDir
          Copy-Item "LICENSE" $packageDir

          Compress-Archive -Path $packageDir -DestinationPath "dist\$packageName.zip" -Force

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}"
          $packageName = "gitlab-work-runner-$version-windows-x86_64"
          gh release create $version "dist\$packageName.zip" --title $version --notes "Windows x86-64 release for $version." --verify-tag
