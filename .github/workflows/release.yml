name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $packageName = "gitlab-work-runner-$version-windows-x86_64"
          $packageDir = Join-Path "dist" $packageName
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          Copy-Item "target\release\gitlab-work-runner.exe" $packageDir
          Copy-Item "target\release\gitlab-work-runner-dashboard.exe" $packageDir
          Copy-Item "config.example.toml" $packageDir
          Copy-Item "rules.example.toml" $packageDir
          Copy-Item "README.md" $packageDir
          Copy-Item "README.en.md" $packageDir
          Copy-Item "LICENSE" $packageDir
          if (Test-Path "examples") {
            Copy-Item "examples" $packageDir -Recurse
          }

          Compress-Archive -Path $packageDir -DestinationPath "dist\$packageName.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*.zip

  linux:
    name: Ubuntu x86_64 release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Show Linux binary glibc requirements
        run: |
          ldd --version
          ldd target/release/gitlab-work-runner
          ldd target/release/gitlab-work-runner-dashboard
          readelf -V target/release/gitlab-work-runner | grep -E "Name: (GLIBC|GCC)_" | sort -u
          readelf -V target/release/gitlab-work-runner-dashboard | grep -E "Name: (GLIBC|GCC)_" | sort -u

      - name: Package release
        run: |
          version="${{ github.ref_name }}"
          package_name="gitlab-work-runner-${version}-linux-x86_64"
          package_dir="dist/${package_name}"
          mkdir -p "$package_dir"

          cp target/release/gitlab-work-runner "$package_dir/"
          cp target/release/gitlab-work-runner-dashboard "$package_dir/"
          cp config.example.toml "$package_dir/"
          cp rules.example.toml "$package_dir/"
          cp README.md "$package_dir/"
          cp README.en.md "$package_dir/"
          cp LICENSE "$package_dir/"
          if [ -d examples ]; then
            cp -r examples "$package_dir/"
          fi

          tar -czf "dist/${package_name}.tar.gz" -C dist "$package_name"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/*.tar.gz

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ github.ref_name }}"
          notes_file=".github/release-notes/${version}.md"
          if [ -f "$notes_file" ]; then
            notes_arg=(--notes-file "$notes_file")
          else
            notes_arg=(--notes "Windows and Ubuntu x86-64 release for $version.")
          fi
          gh release create "$version" dist/* --repo "$GITHUB_REPOSITORY" --title "$version" "${notes_arg[@]}" --verify-tag
