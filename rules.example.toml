# Default example: manual AI Review plus an optional manually triggered script task.

# Global AI review prompt settings shared by every [[ai_reviews]] entry.
# The built-in reviewer system prompt always applies; extra_instructions is appended
# to the system prompt as administrator review policy.
[ai_review]
extra_instructions = ""
# Built-in read-only context tools are enabled by default. The runner controls call count
# and result size.
max_tool_calls = 0
max_tool_result_bytes = 60000

[[ai_reviews]]
id = "ai-review"
title = "AI Review"
base_url = "https://api.openai.com/v1"
api_key = "<your-ai-api-key>"
model = "gpt-4.1-mini"
timeout_seconds = 2400
request_timeout_seconds = 420
second_pass_on_clean = false
# AI Review requests Chat Completions tool_calls by default and falls back to JSON content parsing when needed.
# This does not require MCP; findings are read from submit_review_findings arguments when tool_calls are returned.
max_batch_diff_bytes = 30000
max_batches = 10

[[script_tasks]]
id = "check-todo-tbd"
title = "TODO/TBD 标记检查"
# Relative paths are resolved from the runner executable directory.
# The checked MR source root and result file path are appended as arguments.
command = "python examples/scripts/check_todo_tbd.py"
timeout_seconds = 30
